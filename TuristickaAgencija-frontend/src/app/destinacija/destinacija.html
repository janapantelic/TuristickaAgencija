<div class="page-header">
  <h2 class="page-title">Istražite destinacije</h2>
</div>

<div class="content-container mat-elevation-z2">
  
  <div class="table-actions-bar">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Pretražite destinacije</mat-label>
      <input matInput (keyup)="applyFilter($any($event.target).value)" placeholder="Npr. Pariz">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <mat-table [dataSource]="dataSource" class="custom-table" matSort>

    <ng-container matColumnDef="id">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Id</mat-header-cell>
      <mat-cell *matCellDef="let row" class="bold-id">{{row.id}}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="mesto">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Mesto</mat-header-cell>
      <mat-cell *matCellDef="let row" class="main-text">{{row.mesto}}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="drzava">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Država</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.drzava}}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="opis">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Opis</mat-header-cell>
      <mat-cell *matCellDef="let row" class="description-text">{{row.opis}}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef class="actions-header">
        <button mat-mini-fab color="primary" class="add-btn" (click)="openDialog(1, 0, '', '', '')" title="Dodaj novu destinaciju">
          <mat-icon>add</mat-icon>
        </button>
      </mat-header-cell>
      
      <mat-cell *matCellDef="let row" class="actions-cell">
        <button mat-icon-button class="edit-icon-btn" (click)="openDialog(2, row.id, row.mesto, row.drzava, row.opis)" title="Izmeni">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button class="delete-icon-btn" (click)="openDialog(3, row.id, row.mesto, row.drzava, row.opis)" title="Obriši">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns" class="table-row"></mat-row>

  </mat-table>

  <mat-paginator class="custom-paginator" [pageSize]="10" [pageSizeOptions]="[5, 10, 20]" [showFirstLastButtons]="true"></mat-paginator>

</div>
